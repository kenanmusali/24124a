<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24124a — İmtahan Hazırlığı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F5F0; --card:#FFFFFF; --ink:#20242E; --muted:#6B6E78;
    --line:#E6E1D7; --line-soft:#EFEBE2; --brass:#8A6B2E; --brass-soft:#F1E7D2;
    --green:#2E7D5B; --red:#BE3A2B;
    --shadow:0 1px 2px rgba(32,36,46,.04),0 8px 24px rgba(32,36,46,.05);
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--ink); font-family:'Inter',system-ui,-apple-system,sans-serif; font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased}
  .wrap{max-width:760px; margin:0 auto; padding:40px 20px 80px}
  .serif{font-family:'Spectral',Georgia,serif}

  .brand{display:flex; align-items:center; gap:10px; margin-bottom:34px}
  .brand .mark{width:34px; height:34px; border-radius:9px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Spectral',serif; font-weight:600; font-size:15px; letter-spacing:.02em}
  .brand .name{font-weight:600; font-size:15px; letter-spacing:.02em}
  .brand .name span{color:var(--muted); font-weight:400}

  .eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--brass); font-weight:600}
  h1{font-family:'Spectral',serif; font-weight:600; font-size:34px; line-height:1.12; margin:.3em 0 .2em; letter-spacing:-.01em}
  .lede{color:var(--muted); font-size:16px; margin:0 0 30px; max-width:50ch}

  .sec-label{font-size:13px; font-weight:600; color:var(--ink); margin:0 0 14px}
  .grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
  .subj{display:flex; flex-direction:column; gap:14px; text-align:left; border:1px solid var(--line); background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; cursor:pointer; text-decoration:none; color:inherit; transition:transform .08s, border-color .15s, box-shadow .15s}
  .subj:hover{border-color:var(--brass); transform:translateY(-2px); box-shadow:0 6px 22px rgba(32,36,46,.09)}
  .subj:active{transform:translateY(0)}
  .ic{width:46px; height:46px; border-radius:12px; background:var(--brass-soft); color:var(--brass); display:flex; align-items:center; justify-content:center}
  .ic svg{width:26px; height:26px}
  .subj .s-title{font-family:'Spectral',serif; font-size:19px; font-weight:600; line-height:1.2}
  .subj .s-meta{font-size:13px; color:var(--muted); margin-top:3px}
  .exam{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted); padding-top:13px; border-top:1px solid var(--line-soft)}
  .exam .cal{color:var(--brass); display:flex}
  .exam b{color:var(--ink); font-weight:600}
  .exam .left{margin-left:auto; font-size:11.5px; font-weight:600; padding:4px 9px; border-radius:999px; background:var(--brass-soft); color:var(--brass); white-space:nowrap}
  .exam .left.soon{background:#FBE9E6; color:var(--red)}
  .exam .left.past{background:#EDEAE3; color:var(--muted)}
  .subj .go{display:inline-flex; align-items:center; gap:6px; font-size:13.5px; font-weight:600; color:var(--ink)}
  .subj:hover .go{color:var(--brass)}

  @media (max-width:560px){
    .wrap{padding:30px 16px 70px}
    h1{font-size:28px}
    .grid{grid-template-columns:1fr}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="mark serif" style="width:fit-content; padding: 8px 12px;">UTECA</div>
    <div class="name">24124a <span>· imtahan hazırlığı</span></div>
  </div>

  <div class="eyebrow">Fənn seç</div>
  <h1>Hansı fəndən hazırlaşırsan?</h1>
  <p class="lede">Bir fənn seç və testə başla. Hər testdə 500 sual, aralıq və sıra filtri, nəticə təhlili var.</p>

  <div class="sec-label">Fənlər</div>
  <div class="grid" id="grid"></div>

</div>

<script>
(function(){
  // ===== Yeni fənn əlavə etmək üçün bura bir sətir əlavə et =====
  const SUBJECTS = [
    {
      id:'diskret', name:'Diskret Riyaziyyat', meta:'500 sual', file:'./diskret-riyaziyyat.html',
      exam:'2026-06-12',  // iyun imtahan tarixi
      icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.3"/><circle cx="18" cy="7" r="2.3"/><circle cx="8" cy="18" r="2.3"/><circle cx="18" cy="17" r="2.3"/><path d="M8.2 6.6l7.6.6M7.2 8L8 15.8M10.2 18h5.6M16.4 8.6l-6.8 8"/></svg>'
    },
    {
      id:'felsefe', name:'Fəlsəfə', meta:'500 sual', file:'./felsefe.html',
      exam:'2026-06-16',  // iyun imtahan tarixi
      icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 21h14M6 21V9M18 21V9M4 9h16l-2-4H6L4 9zM9 9v12M15 9v12"/></svg>'
    },
    {
      id:'reqemsal', name:'Rəqəmsal Sistemlər', meta:'500 sual', file:'./reqemsal-sistemler.html',
      exam:'2026-06-17',  // iyun imtahan tarixi
      icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4V6h6v12h6v-6h2"/></svg>'
    },
    {
      id:'informasiya', name:'İnformasiya Təhlükəsizliyi', meta:'494 sual', file:'./informasiya-tehlukesizliyi.html',
      exam:'2026-06-18',  // iyun imtahan tarixi
      icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 4.5-3 7.5-8 10-5-2.5-8-5.5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>'
    },
    {
      id:'komputer', name:'Komputer Qrafikası', meta:'500 sual', file:'./komputer-qrafikasi.html',
      exam:'2026-06-19',  // iyun imtahan tarixi
      icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5L5 20"/></svg>'
    },
    
  ];

  const months=['yanvar','fevral','mart','aprel','may','iyun','iyul','avqust','sentyabr','oktyabr','noyabr','dekabr'];
  const today=new Date(); today.setHours(0,0,0,0);
  const grid=document.getElementById('grid');

  SUBJECTS.forEach(s=>{
    const d=new Date(s.exam); d.setHours(0,0,0,0);
    const dateStr=d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
    const diff=Math.round((d-today)/86400000);
    let leftTxt, cls='';
    if(diff>0){ leftTxt=diff+' gün qalıb'; if(diff<=7) cls='soon'; }
    else if(diff===0){ leftTxt='Bu gün'; cls='soon'; }
    else { leftTxt='keçib'; cls='past'; }

    const a=document.createElement('a');
    a.className='subj'; a.href=s.file;
    a.innerHTML=
      '<div class="ic">'+s.icon+'</div>'+
      '<div><div class="s-title">'+s.name+'</div><div class="s-meta">'+s.meta+'</div></div>'+
      '<div class="exam">'+
        '<span class="cal"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg></span>'+
        'İmtahan: <b>'+dateStr+'</b>'+
        '<span class="left '+cls+'">'+leftTxt+'</span>'+
      '</div>'+
      '<span class="go">Testə başla <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>';
    grid.appendChild(a);
  });
})();
</script>
</body>
</html>
